name: unit

on:
  pull_request:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sanity:
    name: Code sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install codespell
        run: python -m pip install --upgrade pip && python -m pip install codespell
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -A missing-docs
      - name: Run codespell
        run: codespell --quiet-level=2 --skip="backup,target,.git"

  test:
    name: Run tests
    needs: [sanity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Run tests (collect JUnit)
        run: cargo nextest run --workspace --no-fail-fast --profile ci
      - name: Upload test results to Codecov (optional)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage (llvm-cov)
        run: cargo llvm-cov --lcov --output-path target/lcov.info nextest --workspace --no-fail-fast
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-success:
    name: unit success
    runs-on: ubuntu-latest
    needs: [test, coverage]
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
