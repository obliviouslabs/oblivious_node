services:
  eth_privatestate:
    image: ${OBLIVIOUS_NODE_IMAGE}
    container_name: eth_privatestate
    restart: unless-stopped
    command:
      - eth_privatestate
      - --admin-api-key
      - ${ADMIN_API_KEY}
      - --listen-addr
      - 0.0.0.0:8545
      - --leaky-error-recovery
    environment:
      - DSTACK_SOCKET_PATH=${DSTACK_SOCKET_PATH:-/var/run/dstack.sock}
    ports:
      - "8545:8545"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
